version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: qlvb-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9100:9000"   # API endpoint
      - "9101:9001"   # Web Console
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - qlvb-network

volumes:
  minio_data:
    driver: local

networks:
  qlvb-network:
    driver: bridge
